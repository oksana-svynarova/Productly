<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productly</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
      <header class="header flex">
        <div class="logo flex">
          <a href="#" class="logo__link">
            <img src="./assets/icons/logo.png" alt="Logo" class="logo__img">
          </a>
          <a href="#" class="logo__link">
            <h1 class="logo__text">Productly</h1>
          </a>
        </div>
        <nav class="nav flex">
          <ul class="nav__list flex">
            <li class="nav__item">
              <a href="#" class="nav__link">Product</a>
            </li>
            <li class="nav__item">
              <a href="#" class="nav__link">Customers</a>
            </li>
            <li class="nav__item">
              <a href="#" class="nav__link">Pricing</a>
            </li>
            <li class="nav__item">
              <a href="#" class="nav__link">Resources</a>
            </li>
          </ul>
        </nav>
        <div class="buttons-auth flex">
          <a href="#" class="button__link">
            <button type="submit" class="button button-sign-in">
              <span class="button__text">Sign in</span>
            </button>
          </a>
          <a href="#" class="button__link">
            <button type="submit" class="button button-sign-up">
              <span class="button__text">Sign Up</span>
            </button>
          </a>
        </div>
      </header>
    </div>
</body>
</html>
